name: Deploy backend to EC2

# Manual trigger only. Terraform is run locally by the maintainer, never here.
on:
  workflow_dispatch: {}

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ vars.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy over SSH (build on EC2)
        run: |
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_ed25519 ec2-user@${{ vars.EC2_HOST }} bash -s <<'EOF'
          set -euo pipefail

          # 1) Ensure the repo exists on the instance and matches this commit.
          if [ ! -d "$HOME/echoType/.git" ]; then
            rm -rf "$HOME/echoType"
            git clone https://github.com/wkqslzd/echoType.git "$HOME/echoType"
          fi
          cd "$HOME/echoType"
          git fetch --all --prune
          git checkout -f ${{ github.sha }}

          # 2) Write the deploy env file from CI-provided secrets/vars.
          cat > deploy/.env <<'ENV'
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          DEMO_USER_ID=demo-user
          API_PORT=3001
          WEB_ORIGIN=http://${{ vars.EC2_HOST }}
          ENV

          # 3) Build + run (entrypoint runs prisma migrate deploy + seed, then starts).
          docker compose -f deploy/docker-compose.cloud.yml --env-file deploy/.env up -d --build
          docker image prune -f
          EOF

      - name: Health check (fail = fail, no rollback)
        run: |
          for i in $(seq 1 20); do
            if curl -fsS --max-time 5 "http://${{ vars.EC2_HOST }}/health" | grep -q '"ok":true'; then
              echo "Health OK"
              curl -fsS "http://${{ vars.EC2_HOST }}/courses" || true
              exit 0
            fi
            echo "waiting for backend... attempt $i"
            sleep 6
          done
          echo "Health check failed"
          exit 1
