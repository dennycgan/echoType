name: Deploy frontend to S3 + CloudFront

# Manual trigger only. Decoupled from the backend deploy.
on:
  workflow_dispatch: {}

concurrency:
  group: deploy-web
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-southeast-2

jobs:
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Cognito env for Vite build
        id: cognito
        run: |
          set -euo pipefail
          POOL_ID=$(aws ssm get-parameter --name /echotype/COGNITO_USER_POOL_ID --query Parameter.Value --output text)
          CLIENT_ID=$(aws ssm get-parameter --name /echotype/COGNITO_CLIENT_ID --query Parameter.Value --output text)
          REGION=$(aws ssm get-parameter --name /echotype/COGNITO_REGION --query Parameter.Value --output text)
          if [ -z "$POOL_ID" ] || [ -z "$CLIENT_ID" ]; then
            echo "COGNITO SSM params empty — check github-deploy IAM ssm:GetParameter on /echotype/COGNITO_*"
            exit 1
          fi
          echo "pool_id=$POOL_ID" >> "$GITHUB_OUTPUT"
          echo "client_id=$CLIENT_ID" >> "$GITHUB_OUTPUT"
          echo "region=$REGION" >> "$GITHUB_OUTPUT"

      - name: Build frontend
        env:
          VITE_COGNITO_USER_POOL_ID: ${{ steps.cognito.outputs.pool_id }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.cognito.outputs.client_id }}
          VITE_COGNITO_REGION: ${{ steps.cognito.outputs.region }}
        run: pnpm --filter @echotype/web build

      - name: Upload build to S3
        run: aws s3 sync apps/web/dist "s3://${{ vars.WEB_BUCKET }}" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ vars.CF_DISTRIBUTION_ID }}" \
            --paths "/*"
